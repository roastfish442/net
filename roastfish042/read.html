<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阅读 · 小说</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            background-color: #f8faf8;
            color: #333;
        }
        
        header {
            background: linear-gradient(135deg, #c8f1cd 0%, #a0e2a8 100%);
            padding: 15px 0;
            text-align: center;
        }
        
        .logo-container {
            width: 90%;
            max-width: 500px;
            margin: 0 auto;
        }
        
        nav {
            background: #55b675;
        }
        
        nav ul {
            padding: 0;
            list-style: none;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        nav li {
            padding: 12px 15px;
        }
        
        nav a {
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
        }
        
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        
        .story-title {
            font-size: 32px;
            color: #55b675;
            margin-bottom: 10px;
        }
        
        .story-meta {
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        
        .story-meta span {
            margin-right: 20px;
        }
        
        .story-meta i {
            margin-right: 5px;
            color: #55b675;
        }
        
        .story-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0 20px;
        }
        
        .story-tag {
            background: #e8f5e9;
            color: #388e3c;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 13px;
        }
        
        .story-content {
            font-size: 18px;
            line-height: 1.8;
            color: #2c3e50;
            min-height: 200px;
        }
        
        .story-content p {
                margin: 1.2em 0;
    text-indent: 2em;      
    line-height: 1.8;
            }
        
        .story-content h1 {
            color: #55b675;
            font-size: 28px;
            margin: 1.5em 0 0.5em;
        }
        
        .story-content h2 {
            color: #55b675;
            font-size: 24px;
            margin: 1.2em 0 0.5em;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 40px;
            padding: 10px 20px;
            background: #55b675;
            color: white;
            text-decoration: none;
            border-radius: 25px;
        }
        
        .back-link:hover {
            background: #3d8b52;
        }
        
        .back-link i {
            margin-right: 5px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #888;
        }
        
        .error {
            color: #e74c3c;
            padding: 30px;
            text-align: center;
            background: #fdf0ef;
            border-radius: 8px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="/logo.png" alt="logo" width="40%" height="auto">
        </div>
    </header>
    
   <nav>
        <ul>
    <li><a href="index.html#home"> 首页</a></li>
            <li><a href="index.html#games">我的游戏</a></li>
            <li><a href="huahua.html">绘画作品</a></li>
            <li><a href="stories.html">小说</a></li>
            <li><a href="card.html">集章卡</a></li>
        </ul>
    </nav>
    
    <div class="container" id="app">
        <div class="loading">加载中...</div>
    </div>
     <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="stories.js"></script>
    <script>
       // ===== 支持 Markdown 格式的阅读页 =====
    
    const app = document.getElementById('app');
    const urlParams = new URLSearchParams(window.location.search);
    const storyId = urlParams.get('id');
    
    // 检查数据
    if (typeof storiesData === 'undefined') {
        app.innerHTML = '<div class="error">❌ 错误：stories.js 未加载</div>';
    } else if (!storyId) {
        app.innerHTML = '<div class="error">❌ 错误：未指定小说ID</div>';
    } else {
        // 查找小说
        const story = storiesData.find(s => s.id == storyId);
        
        if (!story) {
            app.innerHTML = '<div class="error">❌ 错误：找不到ID为 ' + storyId + ' 的小说</div>';
        } else {
            // 先显示标题和元数据
            let tagsHtml = '';
            if (story.tags && story.tags.length > 0) {
                tagsHtml = '<div class="story-tags">';
                story.tags.forEach(tag => {
                    tagsHtml += '<span class="story-tag">#' + tag + '</span>';
                });
                tagsHtml += '</div>';
            }
            
            app.innerHTML = `
                <h1 class="story-title">${story.title}</h1>
                ${tagsHtml}
                <div class="story-meta">
                    <span><i class="far fa-calendar-alt"></i> ${story.date}</span>
                    <span><i class="fas fa-tags"></i> ${story.category}</span>
                    <span><i class="fas fa-book-open"></i> ${story.words}字</span>
                </div>
                <div class="story-content" id="content">
                    <div class="loading">📖 正在加载内容...</div>
                </div>
                <a href="stories.html" class="back-link">
                    <i class="fas fa-arrow-left"></i> 返回列表
                </a>
            `;
            
            const contentDiv = document.getElementById('content');
            
            // 判断是外部文件还是内嵌内容
            if (story.content && typeof story.content === 'string' && story.content.startsWith('stories/')) {
                // 从外部文件加载
                fetch(story.content)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error(`HTTP ${response.status}`);
                        }
                        return response.text();
                    })
                    .then(text => {
                        if (!text || text.trim() === '') {
                            contentDiv.innerHTML = '<p>📭 文件内容为空</p>';
                            return;
                        }
                        
                        // 使用 marked 解析 Markdown
                        contentDiv.innerHTML = marked.parse(text);
                        
                        // 为解析后的内容添加一些样式（可选）
                        contentDiv.querySelectorAll('h1').forEach(h => h.style.color = '#55b675');
                        contentDiv.querySelectorAll('h2').forEach(h => h.style.color = '#55b675');
                        contentDiv.querySelectorAll('h3').forEach(h => h.style.color = '#55b675');
                    })
                    .catch(err => {
                        contentDiv.innerHTML = `
                            <div class="error">
                                ❌ 加载失败<br>
                                文件路径: ${story.content}<br>
                                错误: ${err.message}<br>
                                <br>
                                请检查:
                                <ul style="text-align:left; margin-top:10px;">
                                    <li>stories 文件夹是否存在</li>
                                    <li>文件 ${story.content} 是否存在</li>
                                    <li>文件名大小写是否正确</li>
                                </ul>
                            </div>
                        `;
                    });
            } else if (story.content) {
                // 内容直接写在JS里，也用 marked 解析
                contentDiv.innerHTML = marked.parse(story.content);
            } else {
                contentDiv.innerHTML = '<p>暂无内容</p>';
            }
        }
    }
    </script>
</body>
</html>
